[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/blog/"
  to = "/blog"
  status = 301
  force = true

[[redirects]]
  from = "/faq/"
  to = "/faq"
  status = 301
  force = true

[[redirects]]
  from = "/tarifs/"
  to = "/tarifs"
  status = 301
  force = true

[[redirects]]
  from = "/generateur-facture/"
  to = "/generateur-facture"
  status = 301
  force = true

[[redirects]]
  from = "/modules/"
  to = "/modules"
  status = 301
  force = true

[[redirects]]
  from = "/secteurs/"
  to = "/secteurs"
  status = 301
  force = true

[[redirects]]
  from = "/blog/categorie/:categorySlug/"
  to = "/blog/categorie/:categorySlug"
  status = 301
  force = true

[[redirects]]
  from = "/blog/:slug/"
  to = "/blog/:slug"
  status = 301
  force = true

[[redirects]]
  from = "/api/tva/*"
  to = "/.netlify/functions/tva/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
